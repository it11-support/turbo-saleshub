name: Deploy Production

on:
  push:
    branches: [ "release/v1" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Exit immediately if a command exits with a non-zero status
            set -e

            cd /home/sysdevrco1/release/turbo-saleshub
            git pull origin release/v1

            # Backend env
            cat > apps/backend/.env <<EOF
            DATABASE_USER=${{ secrets.DATABASE_USER }}
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            DATABASE_NAME=${{ secrets.DATABASE_NAME }}
            DATABASE_HOST=${{ secrets.DATABASE_HOST }}
            DATABASE_PORT=${{ secrets.DATABASE_PORT }}
            DATABASE_URL=mysql://${{ secrets.DATABASE_USER }}:${{ secrets.DATABASE_PASSWORD }}@${{ secrets.DATABASE_HOST }}:${{ secrets.DATABASE_PORT }}/${{ secrets.DATABASE_NAME }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            TZ=Asia/Makassar
            NODE_ENV=production
            PORT=4000
            EOF

            # Frontend env
            cat > apps/frontend/.env.production <<EOF
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_APP_TITLE="${{ secrets.NEXT_PUBLIC_APP_TITLE }}"
            NEXT_REMOTE_PROTOCOL=${{ secrets.NEXT_REMOTE_PROTOCOL }}
            NEXT_REMOTE_HOSTNAME=${{ secrets.NEXT_REMOTE_HOSTNAME }}
            NEXT_REMOTE_PATH=${{ secrets.NEXT_REMOTE_PATH }}
            NODE_ENV=production
            PORT=3001
            TZ=Asia/Makassar
            EOF

            # Install dependencies
            pnpm install --frozen-lockfile

            # Backend prisma generate & build
            pnpm --filter ./apps/backend db:generate
            pnpm --filter ./apps/backend build

            # Frontend build
            pnpm --filter ./apps/frontend lint
            pnpm --filter ./apps/frontend build

            npx pm2 delete saleshub-backend saleshub-frontend || true

            fuser -k 4000/tcp || true
            fuser -k 3001/tcp || true

            npx pm2 start ecosystem.config.js
            npx pm2 save
