version: 2
updates:
  - package-ecosystem: "pnpm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    ignore:
      - dependency-name: "@saleshub-tsm/types"
    open-pull-requests-limit: 10
    
    versioning-strategy: increase

    groups:
      monorepo-dependencies:
        patterns:
          - "next"
          - "react*"
          - "express"
          - "prisma*"
